<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteGuard</title>
    <meta name="description" content="Secure SQLite-based voting verification system">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>VoteGuard</h1>
            <p class="subtitle">Secure Backend Database Validation</p>
        </header>

        <div id="loginSection" class="card">
            <h2 style="font-size:1.1rem; margin-bottom:1rem; color:var(--text-main); text-align:center;">Operator Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div id="loginMessage" class="message-box"></div>
        </div>

        <div id="appContent" class="hidden">
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="stats-container">
                    <span class="stat-label">Total Unique Voters</span>
                    <span class="stat-value" id="statsCount">0</span>
                </div>
            </div>

            <div class="card" style="margin-bottom: 1.5rem;">
                <h2 style="font-size:1.1rem; margin-bottom:1rem; color:var(--text-main);">Cast Vote</h2>
                <form id="votingForm">
                    <div class="form-group">
                        <label for="firstName">First Name <span style="color:var(--error-color)">*</span></label>
                        <input type="text" id="firstName" name="firstName" required placeholder="e.g. John" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="e.g. Doe" autocomplete="off">
                    </div>

                    <div class="form-group">
                        <label for="voterId">Voter ID / Email</label>
                        <input type="text" id="voterId" name="voterId" placeholder="ID-123 or email@example.com" autocomplete="off">
                    </div>

                    <button type="submit" class="btn-primary">Submit Vote</button>
                </form>

                <div id="statusMessage" class="message-box"></div>
            </div>

            <div class="card">
                <h2 style="font-size:1.1rem; margin-bottom:1rem; color:var(--text-main);">Data Management</h2>
                <div class="actions-grid">
                    <button id="exportBtn" class="btn-outline">Export Data</button>
                    <button id="importBtn" class="btn-outline">Import Data</button>
                    <button id="logoutBtn" class="btn-outline" style="grid-column: span 2; border-color: var(--error-color); color: var(--error-color);">Logout</button>
                </div>
                <input type="file" id="fileInput" accept=".json" class="hidden">
                <div id="importStatus" class="message-box"></div>
            </div>

            <div class="footer">
                Backend Database Persistence Enabled
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
