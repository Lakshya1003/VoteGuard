<!DOCTYPE html>
<html lang="en">
<head>

    <title>VoteGuard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>

            <a href="{{ url_for('import_data') }}" class="btn btn-outline">IMPORT DATA AND CONTINUE</a>
        </div>

        <div style="text-align: center; margin-top: 3rem;">
            <p class="dev-info">Developer: Lakshya Raj Malviya</p>
            <p class="dev-info"><a href="https://www.linkedin.com/in/lakshya-raj-malviya/" target="_blank">LinkedIn Profile</a></p>
