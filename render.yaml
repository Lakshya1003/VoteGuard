services:
  - type: web
    name: voteguard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_PATH
        value: /var/data/voteguard.db
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
